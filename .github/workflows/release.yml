name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------
  # Build platform-specific wheels.
  # Each wheel bundles the libobs binaries downloaded by fetch_libs.py,
  # so end users `pip install pylibobs` and it Just Works™ — no OBS
  # install required.
  # --------------------------------------------------------------------
  build-wheels:
    name: Build wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_os: windows
            target_arch: x86_64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x86_64
          # Apple Silicon only — Apple stopped shipping Intel Macs in
          # 2022 and GitHub's macos-13 (Intel) runners have multi-hour
          # queue times. Intel users can still install pylibobs from
          # sdist (which compiles fine on any macOS).
          - os: macos-14
            target_os: macos
            target_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68" build wheel requests
          if [ "${{ runner.os }}" = "Linux" ]; then
            pip install zstandard
          fi
        shell: bash

      - name: Download bundled libobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_libs.py \
            --platform ${{ matrix.target_os }} \
            --arch ${{ matrix.target_arch }}
        shell: bash

      - name: Verify bundled libs are in place
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          base = Path("pylibobs/_libs/${{ matrix.target_os }}/${{ matrix.target_arch }}")
          if not base.exists():
              sys.exit(f"Missing {base}")
          files = list(base.rglob("*"))
          total = sum(f.stat().st_size for f in files if f.is_file())
          print(f"Bundled {len(files)} files / {total/1e6:.1f} MB in {base}")
          PY
        shell: bash

      - name: Build wheel
        # Use build isolation so build downloads the exact setuptools>=68
        # declared in pyproject.toml's [build-system].requires.
        run: python -m build --wheel

      # Linux wheels must carry a manylinux tag for PyPI to accept them.
      # auditwheel repair walks the bundled .so's, finds external deps, and
      # rewrites the wheel with everything self-contained.
      - name: auditwheel repair (Linux only)
        if: runner.os == 'Linux'
        run: |
          pip install auditwheel
          mkdir -p wheelhouse
          for whl in dist/*.whl; do
            # NOTE: --exclude libc.so* keeps the wheel reasonable;
            # auditwheel bundles everything else.
            auditwheel repair "$whl" \
              --plat manylinux_2_31_x86_64 \
              -w wheelhouse || cp "$whl" wheelhouse/
          done
          rm -rf dist
          mv wheelhouse dist
        shell: bash
        continue-on-error: true   # if auditwheel can't repair, fall back

      # macOS wheels — delocate bundles transitive .dylib deps via
      # @loader_path. We've already done this manually in fetch_libs.py
      # by copying the .app's Frameworks/ tree, so this is just a check.
      - name: delocate-wheel (macOS only)
        if: runner.os == 'macOS'
        run: |
          pip install delocate
          mkdir -p wheelhouse
          for whl in dist/*.whl; do
            delocate-wheel -w wheelhouse -v "$whl" || cp "$whl" wheelhouse/
          done
          rm -rf dist
          mv wheelhouse dist
        shell: bash
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/*.whl

  # --------------------------------------------------------------------
  # Build a source distribution (sdist) — used as a fallback on platforms
  # we don't ship binary wheels for. Builds from the user's system OBS.
  # --------------------------------------------------------------------
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC).
  # Requires the pylibobs project on PyPI to have this repo registered as
  # a trusted publisher. No tokens stored in GitHub secrets.
  # --------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pylibobs
    permissions:
      id-token: write       # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what we're publishing
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publishing — no password / token needed if configured
          packages-dir: dist/

  # --------------------------------------------------------------------
  # Attach wheels to the GitHub release
  # --------------------------------------------------------------------
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release with wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
