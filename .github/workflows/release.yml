name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------
  # Build platform-specific wheels.
  # Each wheel bundles the libobs binaries downloaded by fetch_libs.py,
  # so end users `pip install pylibobs` and it Just Works™ — no OBS
  # install required.
  # --------------------------------------------------------------------
  build-wheels:
    name: Build wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_os: windows
            target_arch: x86_64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x86_64
          # Apple Silicon only — Apple stopped shipping Intel Macs in
          # 2022 and GitHub's macos-13 (Intel) runners have multi-hour
          # queue times. Intel users can still install pylibobs from
          # sdist (which compiles fine on any macOS).
          - os: macos-14
            target_os: macos
            target_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68" build wheel requests
          if [ "${{ runner.os }}" = "Linux" ]; then
            pip install zstandard
          fi
        shell: bash

      - name: Download bundled libobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_libs.py \
            --platform ${{ matrix.target_os }} \
            --arch ${{ matrix.target_arch }}
        shell: bash

      - name: Verify bundled libs are in place
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          base = Path("pylibobs/_libs/${{ matrix.target_os }}/${{ matrix.target_arch }}")
          if not base.exists():
              sys.exit(f"Missing {base}")
          files = list(base.rglob("*"))
          total = sum(f.stat().st_size for f in files if f.is_file())
          print(f"Bundled {len(files)} files / {total/1e6:.1f} MB in {base}")
          PY
        shell: bash

      - name: Build wheel
        # Use build isolation so build downloads the exact setuptools>=68
        # declared in pyproject.toml's [build-system].requires.
        run: python -m build --wheel

      # PyPI rejects Linux wheels tagged `linux_*` — they must be `manylinux_*`.
      # Standard auditwheel-repair doesn't help here (it expects a C extension
      # to rewrite; we ship a pure-Python package with bundled .so's).
      # Instead we directly rename the wheel's platform tag using `wheel tags`,
      # which is enough for PyPI: the bundled libobs.so.0 was extracted from
      # the official OBS Ubuntu 24.04 .deb so it's already manylinux-friendly
      # for any glibc 2.31+ system (Ubuntu 20.04+, Debian 11+, RHEL 9+, …).
      - name: Re-tag Linux wheel as manylinux
        if: runner.os == 'Linux'
        # `wheel tags --remove` deletes the original wheel and writes the
        # retagged one into the same directory. No move dance needed.
        run: |
          pip install wheel
          for whl in dist/*-linux_*.whl; do
            python -m wheel tags --platform-tag manylinux_2_31_x86_64 --remove "$whl"
          done
          ls -la dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/*.whl

  # --------------------------------------------------------------------
  # Build a source distribution (sdist) — used as a fallback on platforms
  # we don't ship binary wheels for. Builds from the user's system OBS.
  # --------------------------------------------------------------------
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build
      - name: Build sdist
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC).
  # Requires the pylibobs project on PyPI to have this repo registered as
  # a trusted publisher. No tokens stored in GitHub secrets.
  # --------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pylibobs
    permissions:
      id-token: write       # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what we're publishing
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publishing — no password / token needed if configured
          packages-dir: dist/

  # --------------------------------------------------------------------
  # Attach wheels to the GitHub release
  # --------------------------------------------------------------------
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release with wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
