name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Force UTF-8 stdout/stderr everywhere — Windows runners default to cp1252.
env:
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"

jobs:
  # ------------------------------------------------------------------
  # Unit tests — pure-Python, mock the cffi layer. Fast.
  # Runs on every supported Python on all 3 OSes.
  # ------------------------------------------------------------------
  unit:
    name: Unit / ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:     [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v

  # ------------------------------------------------------------------
  # Wheel-bundling smoke test.
  #
  # We don't run the full integration suite in CI:
  #   • Windows runners (Server 2025) trip libobs's shutdown-crash path
  #     much more often than real hardware — 21-file process-isolated
  #     suite is 100% green locally but flaky on CI.
  #   • Linux runners have no GPU, and Mesa llvmpipe / software GL is
  #     not stable enough for libobs's renderer.
  #   • macOS runners have no display server.
  #
  # Run the full suite on your dev box before tagging a release:
  #     python scripts/run_tests.py
  #
  # CI's job here is narrower but covers the things that DO break in
  # packaging: does fetch_libs.py succeed, does the bundled libobs
  # load, does it report a version. If those pass, the wheel is sound.
  # ------------------------------------------------------------------
  smoke-linux:
    name: Smoke / Linux (bundled libobs loads)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime deps for bundled libobs
        # OBS's libobs.so.0 dlopens system libavcodec, libpulse, etc.
        # Easiest way to satisfy them all: apt-install obs-studio (its
        # transitive deps are exactly what we need).
        run: |
          sudo apt-get update
          sudo apt-get install -y obs-studio dpkg
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Fetch bundled libobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_libs.py --platform linux --arch x86_64
      - name: Smoke test — bundled libobs loads + reports a version
        run: |
          LIBS_DIR="$(pwd)/pylibobs/_libs/linux/x86_64"
          export LD_LIBRARY_PATH="${LIBS_DIR}:${LD_LIBRARY_PATH:-}"
          python - <<'PY'
          from pylibobs._lib import find_libobs
          from pylibobs._ffi import get_lib, ffi
          path = find_libobs()
          print(f"bundled libobs: {path}")
          lib = get_lib()
          ver = ffi.string(lib.obs_get_version_string()).decode()
          print(f"libobs reports: {ver}")
          assert ver, "obs_get_version_string returned empty"
          assert "linux/x86_64" in path, "didn't pick bundled libobs"
          print("OK")
          PY
