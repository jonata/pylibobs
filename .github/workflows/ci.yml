name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Force UTF-8 stdout/stderr everywhere — Windows runners default to cp1252.
env:
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"

jobs:
  # ------------------------------------------------------------------
  # Unit tests — pure-Python, mock the cffi layer. Fast.
  # Runs on every supported Python on all 3 OSes.
  # ------------------------------------------------------------------
  unit:
    name: Unit / ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:     [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v

  # ------------------------------------------------------------------
  # Integration tests — exercise real libobs end-to-end.
  # We download a fresh OBS release with fetch_libs.py, then run the
  # whole suite with process isolation (libobs can't gracefully restart
  # inside a single process — see scripts/run_tests.py).
  # ------------------------------------------------------------------
  integration-windows:
    name: Integration / Windows (bundled libobs)
    runs-on: windows-latest
    # Integration suite is slow + environment-dependent; don't block CI on it.
    # The unit-test matrix is the actual gate.
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Fetch bundled libobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_libs.py
      - name: Run integration tests (process-isolated)
        run: python scripts/run_tests.py

  integration-linux:
    name: Integration / Linux (bundled libobs)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime deps + Xvfb + Mesa software GL
        # OBS 32's libobs.so.0 needs ffmpeg, x264, libpulse, libwayland, …
        # The simplest way to get them all is to apt-install obs-studio
        # (which pulls them in as dependencies). We then override its
        # libobs with the OBS 32 one we bundle via fetch_libs.py.
        # mesa-utils + libgl1-mesa-dri provide the software OpenGL stack
        # libobs needs when there's no real GPU (CI runners have none).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            obs-studio xvfb zstd dpkg \
            mesa-utils libgl1-mesa-dri libegl1-mesa-dev libglu1-mesa
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Fetch bundled OBS 32 libobs.so.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_libs.py --platform linux --arch x86_64
      - name: Run integration tests under Xvfb (software GL)
        env:
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 +extension GLX +render -noreset &
          sleep 3
          glxinfo -B || true                # show what GL we got
          pytest tests/integration -m integration -v --tb=short
